openapi: 3.1.0
info:
  title: Robots.txt
  description: |
    Robot navigator. Move a robot around via an API
    
    ## Base URL
    All paths are relative to `https://server.stumph-stevnsvig.dk/v1`

    ## Features:

    * Define a grid 
    * Spawn in a robot to navigate the grid
  contact:
    email: webhamster@stevnsvig.com
  license:
    name: proprietary
    url: about:blank
  version: 1.0.0

servers:
  - url: https://server.stumph-stevnsvig.dk/v1
    description: Staging server
paths:
  /board:
    post:
      tags:
        - board
      summary: Create a new empty board
    get:
      tags:
        - board
      summary: Get a list of boards
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Board'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /board/{boardId}:
    get:
      tags:
        - board
      summary: Get a board by id
      description: 
      operationId: getBoardById
      parameters:
        - name: boardId
          in: path
          description: the board to get
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
        '400':
          description: Invalid username supplied
        '404':
          description: User not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - board
      summary: delete a board
      description: deletes a board and all related robots
      parameters:
        - name: boardId
          in: path
          description: the board to get
          required: true
          schema:
            type: integer
  /board/{boardId}/robot:
    get:
      tags:
        - robot
        - board
      summary: Get robots on a board
      description: 
      operationId: getRobotsOnBoard
      parameters:
        - name: boardId
          in: path
          description: the board to get robots from
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Robot'
  /robot:
    get:
      tags:
        - robot
      summary: get all robots that exist
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Robot'
  /robot/{robotId}:
    get:
      tags:
        - robot
      summary: get robot by id
      description: 
      operationId: getRobotById
      parameters:
        - name: robotId
          in: path
          description: the robot to get
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Robot'
    delete:
      tags:
        - robot
      summary: delete a robot
      description: deletes a robot
      operationId: deleteRobot
      parameters:
        - name: robotId
          in: path
          description: the robot to delte
          required: true
          schema:
            type: integer
  /robot/{id}/move:
    put:
      tags:
        - robot
      summary: issue move command to robot
      description: 
      operationId: moveRobot
      parameters:
        - name: id
          in: path
          description: the robot to move
          required: true
          schema:
            type: string
      requestBody:
        description: Move command
        content:
          application/json:
            schema:
              type: string
              examples: ["LLLFRR","FFFF"]
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinateDirection'
components:
  schemas:
    Board:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Identifier for use in requests
          examples: [188, 1999]
        rows:
          type: integer
          format: int64
          description: number of rows on the board
          minimum: 2
          maximum: 4294967295
          examples: [8,16,64 188, 1999]
        columns:
          type: integer
          format: int64
          description: number of rows on the board
          minimum: 2
          maximum: 4294967295
          examples: [8,16,64 188, 1999]
    Robot:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Identifier for use in requests
          examples: [1, 2]
        coordinates:
          $ref: '#/components/schemas/CoordinateDirection'
    Coordinate:
      description: Coordinates of an object
      type: object
      properties:
        x:
          type: integer
          format: int64
          description: x-coordinate
          minimum: 1
          maximum: 4294967295
          examples: [8,16,42 188, 1997]
        y:
          type: integer
          format: int64
          description: y-coordinate
          minimum: 1
          maximum: 4294967295
          examples: [8,16,64 188, 1998]
      required:
        - x
        - y
    CoordinateDirection:
      description: The coordinates and direction of the object
      allOf:
        - $ref: '#/components/schemas/Coordinate'
        - type: object
          direction:
            type: string
            description: Direction the object is facing
            examples: [N,S,E,W]
            enum:
              - N
              - S
              - E
              - W
      required:
        - x
        - y
        - direction
      examples: [{"x":45,"y":20, "direction": "E"},{"x":1,"y":1, "direction": "N"}]
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message

